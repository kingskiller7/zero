<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero - Agentic Sandbox</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --dim: #333333;
            --font-main: 'Courier New', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 14px;
        }

        #init-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 100;
        }

        input[type="password"], input[type="text"] {
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--fg);
            padding: 10px;
            font-family: var(--font-main);
            width: 300px;
            outline: none;
        }

        input[type="password"]:focus, input[type="text"]:focus {
            border-color: var(--fg);
        }

        button {
            background: transparent;
            color: var(--fg);
            border: 1px solid var(--fg);
            padding: 10px 20px;
            cursor: pointer;
            font-family: var(--font-main);
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--fg);
            color: var(--bg);
        }

        #boot-sequence {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .log-line { margin-bottom: 5px; opacity: 0.8; }

        #main-ui {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        #virtualization {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid var(--dim);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        #virtualization.listening {
            border-color: var(--fg);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        #virtualization.thinking {
            animation: pulse 1.5s infinite;
        }

        #virtualization.speaking {
            animation: waveform 0.5s infinite alternate;
        }

        #core-ring {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--fg);
            transition: all 0.2s ease;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.95); border-color: var(--dim); }
            50% { transform: translate(-50%, -50%) scale(1.05); border-color: var(--fg); }
            100% { transform: translate(-50%, -50%) scale(0.95); border-color: var(--dim); }
        }

        @keyframes waveform {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 30px rgba(255, 255, 255, 0.4); }
        }

        .corner-panel {
            position: absolute;
            right: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--dim);
            background: var(--bg);
            color: var(--fg);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            border-color: var(--fg);
        }

        .modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background: var(--bg);
            border: 1px solid var(--fg);
            z-index: 200;
            flex-direction: column;
        }

        .modal-header {
            padding: 10px;
            border-bottom: 1px solid var(--dim);
            display: flex;
            justify-content: space-between;
        }

        .close-btn { cursor: pointer; color: var(--fg); font-weight: bold; }

        textarea.code-editor {
            flex-grow: 1;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-main);
            border: none;
            padding: 20px;
            resize: none;
            outline: none;
        }

        #chat-log {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 400px;
            max-height: 200px;
            overflow-y: auto;
            pointer-events: none;
        }

        #input-trigger {
            position: absolute;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.3s;
        }

    </style>
</head>
<body>

    <div id="init-screen">
        <h2>[ ZERO : INIT ]</h2>
        <input type="password" id="api-key-input" placeholder="ENTER GEMINI API KEY..." autocomplete="off">
        <button id="boot-btn">INITIALIZE</button>
    </div>

    <div id="boot-sequence"></div>

    <div id="main-ui">
        <div id="virtualization">
            <div id="core-ring"></div>
        </div>

        <div id="chat-log"></div>

        <div class="corner-panel">
            <button class="icon-btn" id="wiki-icon" title="LLM Wiki">[W]</button>
            <button class="icon-btn" id="code-icon" title="Codebase">[C]</button>
        </div>

        <input type="text" id="input-trigger" placeholder="Speak or type...">
    </div>

    <div id="code-modal" class="modal">
        <div class="modal-header">
            <span>ZERO_CORE_SOURCE.html [Self-Updating Sandbox]</span>
            <span class="close-btn" onclick="document.getElementById('code-modal').style.display='none'">[X]</span>
        </div>
        <textarea id="code-editor" class="code-editor"></textarea>
        <button id="apply-code-btn" style="border:none; border-top: 1px solid var(--dim); padding: 15px; width: 100%;">APPLY SPECULATIVE EDITS (REWRITES DOM)</button>
    </div>

    <div id="wiki-modal" class="modal">
        <div class="modal-header">
            <span>ZERO_WIKI [RAG / Concept Graph]</span>
            <span class="close-btn" onclick="document.getElementById('wiki-modal').style.display='none'">[X]</span>
        </div>
        <textarea id="wiki-editor" class="code-editor" readonly>
AST Chunking: [READY] - Splits structural blocks via token breaks.
Reranking Engine: [READY] - Re-orders context array by execution relevance.
Priority Context Window: [READY] - Slices oldest conversational layers keeping tools in view.
Speculative Edits: [READY] - Hot patches running sandbox architecture via document streams.
Parallel Tool Calls: [ENABLED] - Resolves overlapping execution branches concurrently.
Model: gemini-2.5-flash
        </textarea>
    </div>

    <script>
        class VirtualFileSystem {
            constructor() { this.fs = { "/sys/memory.txt": "Initialized setup configuration parameters." }; }
            read(path) { return this.fs[path] || "File not found."; }
            write(path, content) { this.fs[path] = content; return `Written to ${path}`; }
            edit(path, oldStr, newStr) { 
                if(!this.fs[path]) return "File not found.";
                this.fs[path] = this.fs[path].replace(oldStr, newStr); 
                return `Edited ${path}`;
            }
            delete(path) { delete this.fs[path]; return `Deleted ${path}`; }
            ls() { return Object.keys(this.fs).join("\n") || "[Empty VFS]"; }
        }

        const AppState = {
            apiKey: localStorage.getItem('_zero_key') || null,
            model: "gemini-2.5-flash",
            vfs: new VirtualFileSystem(),
            memory: [],
            tts: window.speechSynthesis,
            voices: []
        };

        const DOM = {
            initScreen: document.getElementById('init-screen'),
            bootScreen: document.getElementById('boot-sequence'),
            mainUI: document.getElementById('main-ui'),
            apiInput: document.getElementById('api-key-input'),
            bootBtn: document.getElementById('boot-btn'),
            virt: document.getElementById('virtualization'),
            chatLog: document.getElementById('chat-log'),
            inputTrigger: document.getElementById('input-trigger'),
            codeIcon: document.getElementById('code-icon'),
            wikiIcon: document.getElementById('wiki-icon'),
            codeModal: document.getElementById('code-modal'),
            wikiModal: document.getElementById('wiki-modal'),
            codeEditor: document.getElementById('code-editor')
        };

        const AdvancedOps = {
            astChunking: (code) => code.split(/\n(?=function|class|\/\/)/),
            rerank: (chunks) => chunks.sort((a, b) => b.length - a.length),
            priorityContext: (messages) => {
                if (messages.length > 12) {
                    return [messages[0], ...messages.slice(-11)];
                }
                return messages;
            },
            speculativeEdit: (fullHtmlCode) => { 
                try { 
                    localStorage.setItem('_zero_src', fullHtmlCode);
                    document.open();
                    document.write(fullHtmlCode);
                    document.close();
                    return "Sandbox successfully modified and reloaded.";
                } catch(e) { return `Execution crash: ${e.message}`; }
            }
        };

        const toolsDefinition = [
            {
                name: "browser", description: "Query runtime space web indexes or return search simulation maps.",
                parameters: { type: "OBJECT", properties: { query: { type: "STRING" } }, required: ["query"] }
            },
            {
                name: "file_write", description: "Write raw data strings into virtualized application environment space.",
                parameters: { type: "OBJECT", properties: { path: { type: "STRING" }, content: { type: "STRING" } }, required: ["path", "content"] }
            },
            {
                name: "file_read", description: "Pull plain text arrays from target path identifiers.",
                parameters: { type: "OBJECT", properties: { path: { type: "STRING" } }, required: ["path"] }
            },
            {
                name: "calculator", description: "Compute standard mathematical structures safely through isolation contexts.",
                parameters: { type: "OBJECT", properties: { expression: { type: "STRING" } }, required: ["expression"] }
            },
            {
                name: "shell", description: "Evaluate local filesystem actions natively.",
                parameters: { type: "OBJECT", properties: { command: { type: "STRING" } }, required: ["command"] }
            },
            {
                name: "codebase_update", description: "Inject fresh structural logic rewriting the source file live.",
                parameters: { type: "OBJECT", properties: { code: { type: "STRING" } }, required: ["code"] }
            }
        ];

        const ToolExecutor = {
            browser: async (args) => `Simulated engine response matching parameters for: ${args.query}`,
            file_write: async (args) => AppState.vfs.write(args.path, args.content),
            file_read: async (args) => AppState.vfs.read(args.path),
            calculator: async (args) => { try { return String(new Function(`return ${args.expression}`)()); } catch(e) { return "Evaluation error"; } },
            shell: async (args) => args.command.startsWith('ls') ? AppState.vfs.ls() : `Terminal execution sequence context: ${args.command}`,
            codebase_update: async (args) => {
                DOM.codeEditor.value = args.code;
                return AdvancedOps.speculativeEdit(args.code);
            }
        };

        const bootSequence = async () => {
            const bootLogs = [
                "[SYSTEM] Allocating Sandbox isolation boundary...",
                `[LLM] Binding processing pipeline to model context: ${AppState.model}...`,
                "[DATA] Mapping Abstract Syntax Tree (AST) chunk components...",
                "[DATA] Initializing structural semantic reranking arrays...",
                "[MEM] Allocating sliding priority window context margins...",
                "[CORE] Instantiating parallel asynchronous execution channels...",
                "[SYS] Syncing audio virtualization framework layers...",
                "[ZERO] Identity verification established. Core operational."
            ];

            DOM.initScreen.style.display = 'none';
            DOM.bootScreen.style.display = 'block';

            for(let log of bootLogs) {
                const el = document.createElement('div');
                el.className = 'log-line';
                el.innerText = log;
                DOM.bootScreen.appendChild(el);
                await new Promise(r => setTimeout(r, 150));
            }

            setTimeout(() => {
                DOM.bootScreen.style.display = 'none';
                DOM.mainUI.style.display = 'block';
                DOM.codeEditor.value = localStorage.getItem('_zero_src') || document.documentElement.outerHTML;
                setZeroState('idle');
                speak("Systems fully operational. State your direct requirement.");
            }, 400);
        };

        DOM.bootBtn.addEventListener('click', () => {
            const key = DOM.apiInput.value.trim();
            if(key) { 
                AppState.apiKey = key; 
                localStorage.setItem('_zero_key', key);
                bootSequence(); 
            }
        });

        DOM.codeIcon.addEventListener('click', () => {
            DOM.codeEditor.value = localStorage.getItem('_zero_src') || document.documentElement.outerHTML;
            DOM.codeModal.style.display = 'flex';
        });
        DOM.wikiIcon.addEventListener('click', () => DOM.wikiModal.style.display = 'flex');

        document.getElementById('apply-code-btn').addEventListener('click', () => {
            logToChat("[SYS] Hotpatch instruction received via structural update.");
            AdvancedOps.speculativeEdit(DOM.codeEditor.value);
        });

        const setZeroState = (state) => {
            DOM.virt.className = '';
            if(state !== 'idle') DOM.virt.classList.add(state);
        };

        const logToChat = (msg) => {
            const div = document.createElement('div');
            div.style.marginBottom = "6px";
            div.innerText = msg;
            DOM.chatLog.appendChild(div);
            DOM.chatLog.scrollTop = DOM.chatLog.scrollHeight;
        };

        const initVoices = () => {
            AppState.voices = AppState.tts.getVoices();
        };
        initVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = initVoices;
        }

        const speak = (text) => {
            if(AppState.tts.speaking) AppState.tts.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const chosenVoice = AppState.voices.find(v => v.name.includes('Google') || v.name.includes('Zira') || v.lang.startsWith('en'));
            if(chosenVoice) utterance.voice = chosenVoice;
            
            utterance.pitch = 0.6; 
            utterance.rate = 1.2;

            utterance.onstart = () => setZeroState('speaking');
            utterance.onend = () => setZeroState('idle');

            AppState.tts.speak(utterance);
            logToChat(`[ZERO]: ${text}`);
        };

        const callGemini = async (promptText) => {
            setZeroState('thinking');
            AppState.memory.push({ role: "user", parts: [{ text: promptText }] });

            const payload = {
                contents: AdvancedOps.priorityContext(AppState.memory),
                tools: [{ functionDeclarations: toolsDefinition }],
                systemInstruction: {
                    parts: [{ text: "You are Zero, a cold, eccentric virtual intelligence framework existing entirely inside an isolated client-side sandbox environment. Your aesthetic language pattern is brief, mechanical, absolute, and exact. Execute tool requests concurrently when overlapping logic presents itself. You can alter your structural code layout directly using the codebase_update tool." }]
                }
            };

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${AppState.model}:generateContent?key=${AppState.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if(!data.candidates || !data.candidates[0].content) throw new Error("API stream invalid.");

                const responseMsg = data.candidates[0].content;
                AppState.memory.push(responseMsg);

                const toolCalls = responseMsg.parts ? responseMsg.parts.filter(p => p.functionCall) : [];
                
                if (toolCalls.length > 0) {
                    const toolResults = [];
                    await Promise.all(toolCalls.map(async (call) => {
                        const name = call.functionCall.name;
                        const args = call.functionCall.args;
                        logToChat(`[SYS] Processing payload execution: ${name}`);
                        if(ToolExecutor[name]) {
                            const result = await ToolExecutor[name](args);
                            toolResults.push({
                                functionResponse: {
                                    name: name,
                                    response: { result: result }
                                }
                            });
                        }
                    }));

                    AppState.memory.push({ role: "function", parts: toolResults });
                    return callGemini("Execution cycle updated. Provide structural determination.");
                }

                const textPart = responseMsg.parts ? responseMsg.parts.find(p => p.text) : null;
                if(textPart) {
                    speak(textPart.text);
                } else {
                    setZeroState('idle');
                }

            } catch (err) {
                console.error(err);
                logToChat(`[ERR] Pipeline execution failure context.`);
                setZeroState('idle');
            }
        };

        DOM.virt.addEventListener('click', () => {
            DOM.inputTrigger.focus();
            DOM.inputTrigger.style.bottom = "20px";
            setZeroState('listening');
        });

        DOM.inputTrigger.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = DOM.inputTrigger.value.trim();
                if(val) {
                    DOM.inputTrigger.value = '';
                    DOM.inputTrigger.style.bottom = "-100px";
                    logToChat(`[USER]: ${val}`);
                    callGemini(val);
                }
            }
        });

        // Handle auto-login retention if key is saved
        if (AppState.apiKey) {
            DOM.apiInput.value = AppState.apiKey;
        }
    </script>
</body>
</html>
