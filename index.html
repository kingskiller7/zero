<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero - Agentic Sandbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="init-screen">
        <h2>[ ZERO : OPTIMIZED & SECURED ]</h2>
        <input type="password" id="api-key-input" placeholder="ENTER GEMINI API KEY..." autocomplete="off">
        <button id="boot-btn">INITIALIZE</button>
    </div>

    <div id="boot-sequence"></div>

    <div id="main-ui">
        <div id="virtualization"><div id="core-ring"></div></div>
        <div id="chat-log"></div>
        <div class="corner-panel">
            <button class="icon-btn" id="wiki-icon" title="LLM Wiki">[W]</button>
            <button class="icon-btn" id="code-icon" title="Codebase">[C]</button>
        </div>
        <input type="text" id="input-trigger" placeholder="Speak or type...">
    </div>

    <div id="code-modal" class="modal">
        <div class="modal-header">
            <span>ZERO_CORE_SOURCE [Hot-Swappable]</span>
            <span class="close-btn" id="close-code-btn">[X]</span>
        </div>
        <textarea id="code-editor" class="code-editor"></textarea>
        <button id="apply-code-btn">APPLY SPECULATIVE EDITS</button>
    </div>

    <div id="wiki-modal" class="modal">
        <div class="modal-header">
            <span>ZERO_WIKI [Metrics & Tooling]</span>
            <span class="close-btn" id="close-wiki-btn">[X]</span>
        </div>
        <textarea id="wiki-editor" class="code-editor" readonly>
Optimizations & Tools Active:
- Context Pruning Engine
- Dual-Execution Mode (Eval JS vs Full DOM Rewrite)
- Security Sub-Agents: SIEM, EDR, WAF, DLP, IAM, SAST, Forensics
        </textarea>
    </div>

    <script src="app.js"></script>
</body>
</html>
